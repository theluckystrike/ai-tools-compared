<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title }}",
    "description": "{{ page.description }}",
    "author": {
      "@type": "Person",
      "name": "theluckystrike",
      "url": "https://github.com/theluckystrike"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Zovo",
      "url": "https://zovo.one"
    },
    "datePublished": "2026-03-10",
    "mainEntityOfPage": "{{ page.url | absolute_url }}"
  }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #333; }
    h1 { font-size: 1.8em; }
    h2 { font-size: 1.4em; margin-top: 2em; }
    a { color: #1a73e8; }
    footer { margin-top: 3em; padding-top: 1em; border-top: 1px solid #eee; font-size: 0.9em; color: #666; }
  </style>
</head>
<body>
  <header><a href="{{ site.baseurl }}/">{{ site.title }}</a></header>
  <main>{{ content }}</main>
  <footer>Built by theluckystrike — More tips at <a href="https://zovo.one">zovo.one</a></footer>
</body>
</html>
